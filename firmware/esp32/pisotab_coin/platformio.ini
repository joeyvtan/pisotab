[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200
; min_spiffs gives 1.88 MB per OTA slot — required for OTA + fits firmware without BLE
board_build.partitions = min_spiffs.csv

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    knolleary/PubSubClient @ ^2.8
    tzapu/WiFiManager @ ^2.0.17
