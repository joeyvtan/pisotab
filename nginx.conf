# Nginx reverse-proxy + HTTPS for PisoTab
# ─────────────────────────────────────────────────────────────────────────────
# Prerequisites (Ubuntu/Debian):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
#   (Certbot will auto-fill the ssl_certificate lines below)
#
# After certbot runs, reload Nginx:
#   sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # ── TLS (filled in by certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Static dashboard (built React app) ───────────────────────────────────
    root /var/www/pisotab/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API + WebSocket ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.IO needs Upgrade support
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Firmware / APK upload size ────────────────────────────────────────────
    client_max_body_size 110M;
}
